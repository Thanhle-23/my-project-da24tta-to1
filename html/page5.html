<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>In bảng cửu chương </title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style5.css">
	</head>
	<body>
		<div id="container">
            <form id="forminbcc">
                <h1>IN BẢNG CỬU CHƯƠNG </h1>
                    <label for = "num">Chọn số</label>
                    <input type = "number" id = "num" name = "num" min="1" max="9">     
                    <button type="button" onclick ="inBCC();">In</button>
                    <div id ="kq"></div>
            </form>
        </div>    
      
        <script>
            function inBCC(){
                const myform = document.forms["forminbcc"];
                const myNumber = myform.elements[0];
                let num = parseInt(myNumber.value);
                let kq="";
                for (let i=1;i<=10;i++){
                    kq+= num + " x "+ i + " = " +(num * i)   + "<br>";
                }
                document.getElementById("kq").innerHTML = kq;
            }
        </script>
	</body>
</html>
