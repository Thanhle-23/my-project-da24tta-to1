<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Học phí </title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style6.css">
	</head>
	<body>
		<div id="container">
            <button type="button" onclick ="add();">Thêm</button>
        </div>    
        <div id="hienthi" class="row">

        </div>
        <script>
            function add(){
                const myRow = document.createElement("div");
                myRow.setAttribute("class","row");
                const myText =document.createTextNode("haha");
                myRow.appendChild(myText);
                document.getElementById("hienthi").appendChild(myRow);
            }
            
        </script>
	</body>
</html>
