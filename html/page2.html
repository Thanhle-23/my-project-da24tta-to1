<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Đăng nhập hệ thống </title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style2.css">
	</head>
	<body>
		<div id = "container">
            <form id = "fLog">
                <h2 id = "title">Đăng nhập hệ thống </h2>
                <div id ="fgroup">
                    <label for = "txtUsername">Tên đăng nhập</label>
                    <input class = "f-control" type = "text" id = "txtUsername" name = "txtUsername">     
                </div>
                <div id ="fgroup">
                    <label for = "txtPassw">Mật khẩu</label>
                    <input class = "f-control" type = "password" id = "txtPassw" name = "txtPassw">     
                </div>
                <div id ="but">
                    <input class = "button1" type = "submit" id = "sbLog" name = "sbLog" value = "Đăng nhập">    
                    <input class = "button2" type = "reset" id = "sbRe" name = "sbRe" value = "Nhập lại">    
                </div>
            </form>
        </div>
	</body>
</html>
